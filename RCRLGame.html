<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Right Colour Right Light - Anthony</title>

<style>
body{
    margin:0;
    overflow:hidden; 
    background:#111;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
    margin:auto;
}

#info{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div id="info">
Right Colour Right Light<br>
by Anthony W<br>
 <br>
Controls<br>
A / D or ← → = Move<br>
Space = Jump<br>
1-4 = Change Color
</div>

<canvas id="game" width="1000" height="600"></canvas>

<button id="nextLevel" onclick="location.href='https://aw101007-alt.github.io/site/level2'" style="
    display:none;
    position:absolute;
    left:50%;
    top:65%;
    transform:translateX(-50%);
    padding:15px 30px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#4CAF50;
    color:white;
">
Next Level →
</button>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key] = true;

    if(["1","2","3","4"].includes(e.key)){
        currentWorld = Number(e.key)-1;
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

const colors = [
    "#ff3b3b", // bright red
    "#3ba7ff", // bright blue
    "#3dff7a", // bright green
    "#ffd93b"  // bright yellow
];

const colorNames = ["Red", "Blue", "Green", "Yellow"];

let currentWorld = 0;
let gameWon = false;
const nextLevelBtn = document.getElementById("nextLevel");

const player = {
    x:100,
    y:300,
    w:30,
    h:50,
    vx:0,
    vy:0,
    speed:5,
    jump:-13,
    grounded:false
};

const platforms = [
    {x:0,y:550,w:1000,h:50,color:-1},

    {x:200,y:470,w:150,h:20,color:0},
    {x:420,y:400,w:150,h:20,color:1},
    {x:650,y:330,w:150,h:20,color:2},
    {x:450,y:240,w:150,h:20,color:3},

    {x:700,y:180,w:150,h:20,color:0},
    {x:150,y:180,w:150,h:20,color:1},
    {x:320,y:120,w:150,h:20,color:2},
    {x:550,y:80,w:150,h:20,color:3}
];

const goal = {
    x:850,
    y:20,
    w:80,
    h:80
};

function collide(a,b){
    return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
    );
}

function update(){

    if(gameWon) return;

    player.vx = 0;

    if(keys["a"] || keys["ArrowLeft"])
        player.vx = -player.speed;

    if(keys["d"] || keys["ArrowRight"])
        player.vx = player.speed;

    if((keys[" "] || keys["ArrowUp"]) && player.grounded){
        player.vy = player.jump;
        player.grounded = false;
    }

    player.vy += 0.6;

    player.x += player.vx;
    player.y += player.vy;

    player.grounded = false;

    for(const p of platforms){

        if(p.color !== -1 && p.color !== currentWorld)
            continue;

        if(collide(player,p)){

            if(player.vy >= 0 &&
               player.y + player.h - player.vy <= p.y){
                player.y = p.y - player.h;
                player.vy = 0;
                player.grounded = true;
            }
        }
    }

    if(collide(player,goal)){
        gameWon = true;
    }

    if(player.y > canvas.height){
        player.x = 100;
        player.y = 300;
        player.vy = 0;
    }
}

function draw(){

    ctx.fillStyle = colors[currentWorld];
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(const p of platforms){

        if(p.color === -1){

            ctx.fillStyle = "#777";
            ctx.fillRect(p.x,p.y,p.w,p.h);

        }else{

            ctx.globalAlpha = (p.color === currentWorld) ? 1 : 0.35;

            ctx.fillStyle = colors[p.color];

            ctx.fillRect(p.x,p.y,p.w,p.h);

            ctx.strokeStyle = "black";
            ctx.lineWidth = 2;
            ctx.strokeRect(p.x,p.y,p.w,p.h);
        }
    }

    ctx.globalAlpha = 1;

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(goal.x,goal.y,goal.w,goal.h);

    ctx.fillStyle = "#000";
    ctx.font = "18px Arial";
    ctx.fillText("END",goal.x+15,goal.y+45);

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    ctx.fillStyle = "black";
    ctx.fillRect(player.x+6,player.y+12,4,4);
    ctx.fillRect(player.x+20,player.y+12,4,4);

    // HUD (NOW SHOWS NAME)
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Color: " + colorNames[currentWorld], 20, 40);

    if(gameWon){

        nextLevelBtn.style.display = "block";
        
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle = "white";
        ctx.textAlign = "center";

        ctx.font = "80px Arial";
        ctx.fillText("YOU WON!",canvas.width/2,canvas.height/2);

        ctx.font = "30px Arial";
        ctx.fillText(
            "Refresh to play my game again",
            canvas.width/2,
            canvas.height/2 + 60
        );

        ctx.textAlign = "left";
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
